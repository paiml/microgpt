name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: Test + Clippy + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: |
          cargo llvm-cov --lib --summary-only 2>&1 | tee coverage.txt
          # Extract line coverage (10th column in TOTAL row, not $NF which may be branch)
          COVERAGE=$(grep TOTAL coverage.txt | awk '{for(i=1;i<=NF;i++) if($i ~ /[0-9]+\.[0-9]+%/ && seen++) {print $i; exit}}' | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ] || (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 95% threshold"
            exit 1
          fi

  parity:
    name: Python ↔ Rust Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Generate Python reference (Karpathy's forward pass)
        run: python3 scripts/generate_reference.py

      - name: Run Rust parity tests
        run: cargo test --test parity -- --nocapture
